name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Self-check (no GUI)
        run: CLIPPY_SELFTEST=1 swift run

      - name: Build (release)
        run: swift build -c release
