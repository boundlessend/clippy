name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4.3.1

      # тулчейн пиним явно: иначе Xcode плавает с обновлениями образа раннера,
      # и релиз может собраться не тем компилятором, что последний зелёный CI
      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Self-check (no GUI)
        run: CLIPPY_SELFTEST=1 swift run

      - name: Build (release)
        run: swift build -c release
